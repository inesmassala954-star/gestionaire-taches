<!--Fonctionnalités de base
Ajouter une tâche.
Modifier une tâche.
Supprimer une tâche.
Marquer une tâche comme terminée.
Afficher les tâches terminées et non terminées.

Fonctionnalités avancées
Dates d'échéance.
Priorités (faible, moyenne, élevée).
Catégories (Études, Travail, Personnel...).
Recherche et filtres.
Authentification (connexion utilisateur).
Notifications de rappel.
Tableau de bord avec statistiques.
-->

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta author="MASSALA Ines" content="un gestionnaire de tache">
    <title>gestionnaire des tâches</title>
    <link rel="stylesheet" href="gestion_taches.css">
    <script src="gestion_taches.js" defer></script>
</head>
<body>
    <header><h1> GESTIONNAIRE DES TACHES</h1></header>
    <div id="taches">
        <h2 class="total">Toutes les tâches</h2>
        <div class="controle">
            <input type="text" placeholder="Titre de la tâche">

            <textarea class="taskinput" placeholder="Description"></textarea>
            <!--textarea permet de saisir plusieur lignes (ceci estun
            comentaire html)--> 
            <button id="ajouter">Ajouter</button>
        </div>
        <div class="tache">
            <div>
            <h3>Réviser HTML</h3>
            <p>Apprendre les balises HTML</p>
            <p>Date : 25/06/2026</p>
            <p>Statut : En cours</p>

            <button id="Modifier">Modifier</button>
            <button id="supprimer">Supprimer</button>
            </div>
        </div>
        <section class="taches">
            <h2>tableau de bord</h2>
        </section>
        
    </div>
</body>
