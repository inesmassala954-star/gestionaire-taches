<!--Fonctionnalités de base
Ajouter une tâche.

Supprimer une tâche.

Fonctionnalités avancées

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta author="MASSALA Ines" content="un gestionnaire de tache">
    <title>gestionnaire des tâches</title>
    <link rel="stylesheet" href="gestion_taches.css">
</head>
<body>
    <header><h1> GESTIONNAIRE DES TACHES</h1></header>
    <div id="taches">
        <h2 class="total">Toutes les tâches</h2>
        <div class="controle">
            <input type="text" placeholder="Titre de la tâche">

            <textarea placeholder="Description"></textarea>
            <!--textarea permet de saisir plusieur lignes (ceci estun
            comentaire html)--> 
            <button>Ajouter</button>
        </div>
        <div class="tache">
            <h3>Réviser HTML</h3>
            <p>Apprendre les balises HTML</p>
            <p>Date : 25/06/2026</p>
            <p>Statut : En cours</p>

            <button>Modifier</button>
            <button>Supprimer</button>
        </div>
        <section class="taches">
            <h2>tableau de bord</h2>
        </section>
        
    </div>
</body>
