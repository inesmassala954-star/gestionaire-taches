<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta author="MASSALA Ines" content="un gestionnaire de tache">
    <title>gestionnaire des tâches</title>
    <link rel="stylesheet" href="gestion_taches.css">
    <script src="gestion_taches.js" defer></script>
</head>
<body>
    <header><h1> GESTIONNAIRE DES TACHES</h1></header>
    <div id="taches">
        <h2 class="total">Toutes les tâches</h2>
        <div class="controle">
            <input type="text" placeholder="Titre de la tâche">

            <textarea class="taskinput" placeholder="Description"></textarea>
            <!--textarea permet de saisir plusieur lignes (ceci estun
            comentaire html)--> 
            <button id="ajouter">Ajouter</button>
        </div>
        <div class="tache">
            
        </div>
    </div>
        <section class="taches">
            <h2>tableau de bord</h2>
             <p>Total : <span id="total">0</span></p>
            <p>Terminées : <span id="done">0</span></p>
            <p>En cours : <span id="cours">0</span></p>
            <!-- span est tres utile pour mettre a jour des valeurs-->
        </section>
        
    </div>
</body>
